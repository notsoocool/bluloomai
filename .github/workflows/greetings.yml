# Welcomes first-time contributors on their first issue or PR.
# Uses pull_request_target so we can comment on PRs from forks (token has base-repo perms).
name: "👋 Greetings — first-time contributors"

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            # 👋 Hey there — welcome! 😊✨

            **Thank you** for opening your **first issue** here! 🎉🌟 We’re *so* happy you’re part of **BluLoomAI**! 💜🙌

            ---

            ### 📌 Quick tips (super helpful!) ⭐

            - 🐛 **Bug report?** Add **steps to reproduce**, what you expected, and your **OS / Node / pnpm** if you can — big smile from us! 😄
            - 💬 **Questions or setup?** Hop into [**Discussions**](https://github.com/notsoocool/bluloomai/discussions) (Q&A) — we love helping! 💡🤝
            - 💖 **Ideas?** Share them in **Discussions → Ideas** too — you might spark the next feature! 🚀
            - 🔒 **Security?** **Never** post secrets here — use [**SECURITY.md**](https://github.com/notsoocool/bluloomai/blob/main/SECURITY.md) only! 🛡️

            ---

            ### 🤝 Be excellent to each other

            We follow the [**Code of Conduct**](https://github.com/notsoocool/bluloomai/blob/main/CODE_OF_CONDUCT.md). Stay **kind**, stay **constructive** — maintainers will jump in when they can! ⏳💪

            ---

            **Happy building!** 🚀😁 **You rock!** ⭐🎊
          pr-message: |
            # 🎉 Yay — your first PR! 🙌✨

            **Thank you** for contributing to **BluLoomAI**! 🌟💖 We *really* appreciate you taking the time! 😊

            ---

            ### ✅ Quick checklist (easy wins!) ⭐

            - 📖 Peek at [**CONTRIBUTING.md**](https://github.com/notsoocool/bluloomai/blob/main/CONTRIBUTING.md) if you haven’t yet — it’s short & sweet! 🍬
            - 🤖 **CI** will run **lint** + **build** — green checks = happy maintainers! 💚✅
            - 🔗 Link related **issues** in the PR (e.g. `Closes #123`) — helps everyone follow along! 🧵
            - 📸 **UI change?** Screenshots in the description = chefs kiss! 😘🖼️

            ---

            ### ⏳ Patience = love

            Reviews can take a bit — **thank you** for waiting! 🙏 We’re on it! 💪

            ---

            **Welcome aboard!** 🚢🎊 **You’re awesome!** ⭐😄
